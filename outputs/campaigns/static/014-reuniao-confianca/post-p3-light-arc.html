<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 540px;
    height: 675px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #f5f4f0;
  }

  .post-wrapper {
    position: relative;
    width: 540px;
    height: 675px;
    overflow: hidden;
  }

  /* ── IMAGEM FULL-BLEED ── */
  .img-layer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 430px;
    overflow: hidden;
  }

  .img-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }

  .hook-pill {
    position: absolute;
    top: 24px;
    left: 24px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    color: #0d0d0d;
    letter-spacing: 0.05em;
    max-width: 280px;
    line-height: 1.3;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .badge-free {
    position: absolute;
    top: 24px;
    right: 24px;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 11.5px;
    font-weight: 900;
    color: white;
    letter-spacing: 0.4px;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  /* ── ARCO SVG — transição imagem → painel ── */
  /*
   * O SVG fica posicionado sobre a base da imagem.
   * Path: começa na esquerda na altura H, sobe em curva para o centro (~40px),
   * desce de volta à direita. Fill branco cobre a base da imagem
   * criando a transição orgânica.
   *
   * viewBox: 540 × 80 (altura do arco)
   * O SVG se sobrepõe 30px à imagem (top: 370px) e ao painel (fica acima)
   */
  .arc-svg {
    position: absolute;
    top: 362px;       /* base da imagem - altura do arco */
    left: 0;
    width: 540px;
    height: 80px;
    z-index: 5;
    display: block;
  }

  /* ── PAINEL DE COPY — fundo claro ── */
  .text-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    top: 410px;       /* começa abaixo do pico do arco */
    background: #f5f4f0;
    padding: 0 28px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 4;
  }

  /* Linha de separação sutil (abaixo do arco, acima do headline) */
  .rule {
    width: 36px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    margin-bottom: 10px;
    /* a rule substitui o separator gradient do split */
    /* vem de uma string CSS, não do styleConfig — intencional para light */
    background: linear-gradient(90deg, #FF6B35, #9b5de5);
  }

  .headline {
    font-size: 34px;
    font-weight: 900;
    color: #0d0d0d;
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  .accent {
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    
  }

  .body-copy {
    font-size: 13.5px;
    font-weight: 500;
    color: #555550;
    line-height: 1.5;
    margin-top: 10px;
    max-width: 340px;
    /* clamp a 2 linhas — copy curto é obrigatório nesse template */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 6px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    padding: 13px 26px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 800;
    color: white;
    background: linear-gradient(135deg, #89c7fe 0%, #8bfbd1 20%, #ae90fb 45%, #f599b5 70%, #fdd38a 100%);
    letter-spacing: 0.2px;
    white-space: nowrap;
    box-shadow: 
      0 0 0 1px rgba(249,112,64,0.3),
      0 4px 16px rgba(233,72,153,0.35),
      0 8px 32px rgba(155,93,229,0.2)
    ;
  }

  /* Logo Vivr discreto */
  .vivr-mark {
    font-size: 11px;
    font-weight: 700;
    color: #aaa9a2;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="post-wrapper">

  <!-- IMAGEM -->
  <div class="img-layer">
    <img src="scene.png" alt="" />
    <span class="hook-pill" data-slot="hook">3 segundos de silêncio. Quanto tempo ainda?</span>
    <span class="badge-free">Grátis</span>
  </div>

  <!--
    ARCO SVG
    Path explicado:
      M0,68        → começa no canto esquerdo baixo do arco
      C80,68       → control point 1: mantém esquerda horizontal
       200,8        → control point 2: puxa pico para esquerda-centro
       270,8        → pico do arco (centro-esquerdo)
      C340,8        → control point 3: mantém pico
       460,68       → control point 4: desce para direita
       540,68       → chega no canto direito
      L540,80 L0,80 Z → fecha o shape no rodapé
  -->
  <svg class="arc-svg" viewBox="0 0 540 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,68 C80,68 200,8 270,8 C340,8 460,68 540,68 L540,80 L0,80 Z" fill="#f5f4f0"/>
  </svg>

  <!-- PAINEL DE COPY -->
  <div class="text-panel">
    <div>
      <div class="rule"></div>
      <div class="headline" data-slot="headline"><span class="accent">Silêncio</span> custa caro.</div>
      <div class="body-copy" data-slot="body">No Vivr você pratica situações reais. Sem legenda, sem julgamento.</div>
    </div>
    <div class="cta-row">
      <div class="cta-btn" data-slot="cta">Pratica de graça agora</div>
      <span class="vivr-mark">Vivr</span>
    </div>
  </div>

</div>
</body>
</html>
