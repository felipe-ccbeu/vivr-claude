<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 540px;
    height: 675px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #faf8f5;
  }

  .post-wrapper {
    position: relative;
    width: 540px;
    height: 675px;
    overflow: hidden;
  }

  /* ── IMAGEM FULL-BLEED ── */
  .img-layer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 430px;
    overflow: hidden;
  }

  .img-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }

  /* Hook pill — sobre a imagem, canto superior esquerdo */
  .hook-pill {
    position: absolute;
    top: 24px;
    left: 24px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    color: #0d0d0d;
    letter-spacing: 0.05em;
    max-width: 280px;
    line-height: 1.3;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  /* Badge grátis */
  .badge-free {
    position: absolute;
    top: 24px;
    right: 24px;
    background: linear-gradient(135deg, #f97040 0%, #e94899 35%, #9b5de5 65%);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 11px;
    font-weight: 800;
    color: white;
    letter-spacing: 0.04em;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(233, 72, 153, 0.28);
  }

  /* ── ARCO SVG — transição imagem → painel ── */
  /*
   * O SVG fica posicionado sobre a base da imagem.
   * Path: começa na esquerda na altura H, sobe em curva para o centro (~40px),
   * desce de volta à direita. Fill branco cobre a base da imagem
   * criando a transição orgânica.
   *
   * viewBox: 540 × 80 (altura do arco)
   * O SVG se sobrepõe 30px à imagem (top: 370px) e ao painel (fica acima)
   */
  .arc-svg {
    position: absolute;
    top: 362px;       /* base da imagem - altura do arco */
    left: 0;
    width: 540px;
    height: 80px;
    z-index: 5;
    display: block;
  }

  /* ── PAINEL DE COPY — fundo claro ── */
  .text-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    top: 410px;       /* começa abaixo do pico do arco */
    background: #faf8f5;
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 4;
  }

  /* Linha de separação sutil (abaixo do arco, acima do headline) */
  .rule {
    width: 40px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #f97040, #9b5de5);
    margin-bottom: 14px;
  }

  .headline {
    font-size: 36px;
    font-weight: 900;
    color: #0d0d0d;
    line-height: 1.08;
    letter-spacing: -0.03em;
    max-width: 100%;
  }

  .accent {
    background: linear-gradient(135deg, #f97040 0%, #e94899 35%, #9b5de5 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 1.02em;
    font-weight: 900;
  }

  .body-copy {
    font-size: 14px;
    font-weight: 500;
    color: #6b6b63;
    line-height: 1.5;
    margin-top: 12px;
    max-width: 380px;
    /* clamp a 2 linhas — copy curto é obrigatório nesse template */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 12px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    padding: 14px 30px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 800;
    color: white;
    background: linear-gradient(135deg, #f97040 0%, #e94899 35%, #9b5de5 65%);
    letter-spacing: 0.02em;
    white-space: nowrap;
    box-shadow: 0 6px 20px rgba(233, 72, 153, 0.32);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  /* Logo Vivr discreto */
  .vivr-mark {
    font-size: 11px;
    font-weight: 700;
    color: #b5b4aa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="post-wrapper">

  <!-- IMAGEM -->
  <div class="img-layer">
    <img class="bg-img" src="../campaigns/003-pratica-real/scene.png" alt="" />
    <span class="hook-pill" data-slot="hook">Conversa real no restaurante</span>
    <span class="badge-free">Grátis</span>
  </div>

  <!--
    ARCO SVG
    Path explicado:
      M0,68        → começa no canto esquerdo baixo do arco
      C80,68       → control point 1: mantém esquerda horizontal
       200,8        → control point 2: puxa pico para esquerda-centro
       270,8        → pico do arco (centro-esquerdo)
      C340,8        → control point 3: mantém pico
       460,68       → control point 4: desce para direita
       540,68       → chega no canto direito
      L540,80 L0,80 Z → fecha o shape no rodapé
  -->
  <svg class="arc-svg" viewBox="0 0 540 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,68 C80,68 200,8 270,8 C340,8 460,68 540,68 L540,80 L0,80 Z" fill="#f5f4f0"/>
  </svg>

  <!-- PAINEL DE COPY -->
  <div class="text-panel">
    <div>
      <div class="rule"></div>
      <div class="headline" data-slot="headline"><span class="accent">Peça</span> em inglês</div>
      <div class="body-copy" data-slot="body">Treine diálogos verdadeiros em cenários imersivos.</div>
    </div>
    <div class="cta-row">
      <div class="cta-btn" data-slot="cta">Comece agora</div>
      <span class="vivr-mark">Vivr</span>
    </div>
  </div>

</div>
</body>
</html>
