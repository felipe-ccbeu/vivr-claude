<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 540px; height: 960px; overflow: hidden; font-family: 'Nunito', sans-serif; }
  .post-wrapper { width: 540px; height: 960px; display: flex; flex-direction: row; overflow: hidden; background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%); }
  .image-section { width: 280px; height: 960px; flex-shrink: 0; position: relative; overflow: hidden; padding: 12px; }
  .img-inner { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; position: relative; }
  .image-section img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; display: block; }
  .text-section { flex: 1; background: rgba(10,6,24,0.82); backdrop-filter: blur(12px); margin: 12px 12px 12px 0; border-radius: 20px; padding: 28px 24px 180px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
  .hook-tag { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .headline { font-size: 34px; font-weight: 900; color: #ffffff; line-height: 1.1; letter-spacing: -0.8px; margin-bottom: 10px; }
  .accent { font-style: italic; color: #ffffff; }
  .body-copy { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65); line-height: 1.5; margin-bottom: 16px; letter-spacing: 0.1px; }
  .cta-btn { display: inline-flex; align-items: center; padding: 13px 28px; border-radius: 100px; font-size: 14px; font-weight: 800; color: #1a1030; background: #ffffff; letter-spacing: 0.3px; white-space: nowrap; align-self: flex-start; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div class="post-wrapper">
  <div class="image-section">
    <div class="img-inner">
      <img src="../scene-story.png" alt="" />
    </div>
  </div>
  <div class="text-section">
    <div>
      <div class="hook-tag" data-slot="hook">Na reunião, você sabia o que dizer. Mas as palavras não vieram.</div>
      <div class="headline" data-slot="headline">Você sabia. As palavras não <span class="accent">vieram</span>.</div>
      <div class="body-copy" data-slot="body">O Vivr simula situações reais — reunião, aeroporto, restaurante — para o inglês aparecer quando você mais precisa.</div>
    </div>
    <div class="cta-btn" data-slot="cta">Experimente antes da próxima reunião</div>
  </div>
</div>
</body>
</html>
