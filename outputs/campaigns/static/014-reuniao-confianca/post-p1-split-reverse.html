<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 540px; height: 675px; overflow: hidden; font-family: 'Nunito', sans-serif; background: #1A1030; }
  .post-wrapper { width: 540px; height: 675px; display: flex; flex-direction: row; overflow: hidden; }
  .image-section { width: 240px; height: 675px; flex-shrink: 0; position: relative; overflow: hidden; }
  .image-section img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; display: block; }
  .image-vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 85%, rgba(13,13,13,0.8) 100%); pointer-events: none; }
  .text-section { flex: 1; background: #1A1030; padding: 28px 24px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
  .text-section::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%); }
  .hook-tag { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .headline { font-size: 28px; font-weight: 900; color: #ffffff; line-height: 1.1; letter-spacing: -0.8px; margin-bottom: 10px; }
  .accent { background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .body-copy { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65); line-height: 1.5; margin-bottom: 16px; letter-spacing: 0.1px; }
  .cta-btn { display: inline-flex; align-items: center; padding: 13px 28px; border-radius: 100px; font-size: 14px; font-weight: 800; color: white; background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%); letter-spacing: 0.3px; white-space: nowrap; align-self: flex-start; box-shadow: 0 4px 16px rgba(233,72,153,0.3); }
</style>
</head>
<body>
<div class="post-wrapper">
  <div class="image-section">
    <img src="scene.png" alt="" />
    <div class="image-vignette"></div>
  </div>
  <div class="text-section">
    <div>
      <div class="hook-tag" data-slot="hook">INGLÊS AO VIVO</div>
      <div class="headline" data-slot="headline">Pratica a <span class="accent">reunião</span> antes de entrar nela.</div>
      <div class="body-copy" data-slot="body">No Vivr você conversa com personagens que fazem perguntas reais, sem pausar, sem traduzir.</div>
    </div>
    <div class="cta-btn" data-slot="cta">Pratica a reunião agora</div>
  </div>
</div>
</body>
</html>
