<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 540px; height: 675px; overflow: hidden; font-family: 'Nunito', sans-serif; }

  .post-wrapper {
    width: 540px;
    height: 675px;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    position: relative;
    overflow: hidden;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    max-width: 460px;
  }

  .hook {
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    text-transform: uppercase;
    letter-spacing: 3px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 100px;
    padding: 5px 16px;
  }

  .headline {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    line-height: 1;
  }

  .headline-top {
    font-size: 52px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    line-height: 1.1;
  }

  .accent {
    font-size: 116px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -5px;
    line-height: 0.88;
    text-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }

  .body-copy {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.92);
    line-height: 1.55;
    letter-spacing: 0.1px;
    max-width: 360px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.2);
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    padding: 14px 32px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 900;
    color: #1a0a2e;
    background: #ffffff;
    letter-spacing: 0.5px;
    white-space: nowrap;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }

  .decor-dot {
    position: absolute;
    border-radius: 50%;
  }
  .decor-1 {
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    top: -60px; right: -60px;
  }
  .decor-2 {
    width: 140px; height: 140px;
    background: rgba(0,0,0,0.06);
    bottom: -40px; left: -40px;
  }
</style>
</head>
<body>
<div class="post-wrapper">
  <div class="decor-dot decor-1"></div>
  <div class="decor-dot decor-2"></div>

  <div class="content">
    <div class="hook" data-slot="hook">INGLÊS NA VIDA REAL</div>
    <div class="headline">
      <span class="headline-top" data-slot="headline">Sem .</span>
      <span class="accent" data-slot="accent">silêncio</span>
    </div>
    <div class="body-copy" data-slot="body">O Vivr te coloca dentro das situações que mais travam. Você pratica até a resposta vir automática.</div>
    <div class="cta-btn" data-slot="cta">Experimenta de graça</div>
  </div>
</div>
</body>
</html>
