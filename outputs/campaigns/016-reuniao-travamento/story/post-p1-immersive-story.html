<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 540px; height: 960px; overflow: hidden; font-family: 'Nunito', sans-serif; background: #000; }

  .post-wrapper {
    width: 540px;
    height: 960px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Full-bleed image */
  .image-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .image-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    display: block;
  }

  /* Radial vignette: edges dark, center light (20-30% more transparent) */
  .vignette-layer {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at center,
      rgba(0,0,0,0.0) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(0,0,0,0.40) 75%,
      rgba(0,0,0,0.55) 100%
    );
    pointer-events: none;
    z-index: 1;
  }

  /* Content layer: text centered */
  .content-layer {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
  }

  /* Hook: top */
  .hook-tag {
    position: absolute;
    top: 120px;
    left: 24px;
    background: rgba(255,255,255,0.92);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    color: #1a1030;
    letter-spacing: 0.2px;
    max-width: 360px;
    line-height: 1.3;
  }

  /* Content text: centered vertically */
  .text-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    max-width: 420px;
  }

  /* Headline: huge, centered */
  .headline {
    font-size: 50px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.08;
    letter-spacing: -1px;
  }

  .accent {
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Body: below headline */
  .body-copy {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
    letter-spacing: 0.1px;
  }

  /* CTA: bottom center */
  .cta-section {
    position: absolute;
    bottom: 180px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    padding: 13px 28px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 800;
    color: white;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    letter-spacing: 0.3px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(233,72,153,0.3);
  }
</style>
</head>
<body>
<div class="post-wrapper">
  <div class="image-layer">
    <img src="../scene-story.png" alt="" />
  </div>

  <div class="vignette-layer"></div>

  <div class="hook-tag" data-slot="hook">Você entendeu tudo. Só não conseguiu responder.</div>

  <div class="content-layer">
    <div class="text-content">
      <div class="headline" data-slot="headline">O inglês que você tem não <span class="accent">aparece</span> quando importa</div>
      <div class="body-copy" data-slot="body">No Vivr, você pratica exatamente o que trava: responder na hora, sem roteiro, sem pausa.</div>
    </div>
  </div>

  <div class="cta-section">
    <div class="cta-btn" data-slot="cta">Entre e pratique agora</div>
  </div>
</div>
</body>
</html>
