<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 540px; height: 675px; overflow: hidden; font-family: 'Nunito', sans-serif; }

  .post-wrapper {
    position: relative;
    width: 540px;
    height: 675px;
    overflow: hidden;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 28px 28px;
  }

  .post-wrapper::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 480px;
    height: 480px;
    background: radial-gradient(ellipse at center, rgba(155,93,229,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── coluna central de 320px ── */
  .top-row {
    width: 320px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .hook-text {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.3px;
    max-width: 220px;
    line-height: 1.4;
  }

  .badge-free {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 800;
    color: white;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .frame-outer {
    width: 320px;
    height: 320px;
    border-radius: 26px;
    padding: 3px;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    flex-shrink: 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(155,93,229,0.25);
    position: relative;
    z-index: 1;
  }

  .frame-inner {
    width: 100%;
    height: 100%;
    border-radius: 24px;
    overflow: hidden;
  }

  .frame-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* ── mesmo 320px do frame ── */
  .text-block {
    width: 320px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: justify;
    gap: 9px;
    flex: 1;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-size: 33px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .accent {
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .body-copy {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.42);
    line-height: 1.55;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    padding: 13px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 800;
    color: white;
    background: linear-gradient(135deg, #f7c948 0%, #f97040 20%, #e94899 45%, #9b5de5 65%, #26c6da 83%, #80e27e 100%);
    letter-spacing: 0.2px;
    white-space: nowrap;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="post-wrapper">
  <div class="top-row">
    <span class="hook-text" data-slot="hook">Você chegou no aeroporto, o táxi estava lá, e a boca não abriu.</span>
    <span class="badge-free">Grátis</span>
  </div>
  <div class="frame-outer">
    <div class="frame-inner">
      <img src="scene.png" alt="" />
    </div>
  </div>
  <div class="text-block">
    <div class="headline" data-slot="headline">Pratique a <span class="accent">situação</span> antes de vivê-la</div>
    <div class="body-copy" data-slot="body">O Vivr simula o táxi, o hotel, o restaurante — você pratica antes de estar lá de verdade. Quando chegar, já é terreno conhecido.</div>
    <div class="cta-btn" data-slot="cta">Pratique agora, é grátis</div>
  </div>
</div>
</body>
</html>
